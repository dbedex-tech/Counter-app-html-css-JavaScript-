<!DOCTYPE html>
<html>

<head>
  <meta lang="en" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="counter.css" />
  <title>My Counter App</title>
</head>

<body>

  <section class="main">
    
  <div class="content">
    
    <div class="start" id="action">
      <span>0</span>
    </div>
    <div class="contents">
    <div class="btn_decrease" id="action">
      
      <button type="submit" class="decrease_btn">
        <span>Decrease</span>
      </button>
    </div>
    
    <div class="btn_reset" id="action">
      
      <button type="submit" class="reset_btn">
        <span>Reset</span>
      </button>
    </div>
    
    <div class="btn_increase" id="action">
      
      <button type="submit" class="increase_btn">
        <span>Increase</span>
      </button>
    </div>
    </div>
  </div>
  </section>

<script type="text/javascript" charset="utf-8"
 src="counter.js">
  
</script>
</body>

</html>
